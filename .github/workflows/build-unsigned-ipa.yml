name: Build Unsigned IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Check out project
        uses: actions/checkout@v4

      - name: Build app without signing
        run: |
          xcodebuild \
            -project FrenchGrammar.xcodeproj \
            -target FrenchGrammar \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/FrenchGrammar.app Payload/
          /usr/bin/zip -qry LeekFrench-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LeekFrench-unsigned-ipa
          path: LeekFrench-unsigned.ipa
